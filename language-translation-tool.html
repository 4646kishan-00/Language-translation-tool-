<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Translation Tool</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 2rem;
      width: 100%;
      max-width: 700px;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 2rem;
    }
    .logo {
      width: 48px;
      height: 48px;
      background: #2563eb;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo svg { width: 26px; height: 26px; fill: none; stroke: #fff; stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round; }
    .header-text h1 { font-size: 22px; font-weight: 600; color: #111827; }
    .header-text p { font-size: 13px; color: #6b7280; margin-top: 2px; }

    /* Language selectors */
    .lang-row {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 1.25rem;
    }
    .lang-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: #6b7280; margin-bottom: 6px; }

    select {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      background: #f9fafb;
      color: #111827;
      font-size: 14px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.2s;
    }
    select:focus { border-color: #2563eb; background: #fff; }

    .swap-btn {
      width: 40px;
      height: 40px;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      background: #fff;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      align-self: flex-end;
      margin-bottom: 0;
    }
    .swap-btn:hover { background: #eff6ff; border-color: #2563eb; color: #2563eb; }
    .swap-btn svg { width: 18px; height: 18px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Text areas */
    .editors {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 1.25rem;
    }

    @media (max-width: 540px) {
      .editors { grid-template-columns: 1fr; }
      .lang-row { grid-template-columns: 1fr auto 1fr; }
    }

    .editor-box {
      border: 1.5px solid #d1d5db;
      border-radius: 10px;
      overflow: hidden;
      background: #fff;
      transition: border-color 0.2s;
    }
    .editor-box:focus-within { border-color: #2563eb; }
    .editor-box.output-box { background: #f9fafb; border-color: #e5e7eb; }

    .editor-header {
      padding: 8px 12px;
      background: #f3f4f6;
      border-bottom: 1px solid #e5e7eb;
      font-size: 12px;
      font-weight: 600;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .output-box .editor-header { background: #eef2ff; color: #4338ca; border-bottom-color: #c7d2fe; }

    textarea {
      width: 100%;
      padding: 12px;
      border: none;
      background: transparent;
      color: #111827;
      font-size: 15px;
      line-height: 1.65;
      resize: none;
      outline: none;
      font-family: inherit;
      min-height: 160px;
    }

    .editor-footer {
      padding: 6px 12px;
      border-top: 1px solid #e5e7eb;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
    }
    .char-count { font-size: 11px; color: #9ca3af; }

    #outputArea {
      min-height: 160px;
      padding: 12px;
      color: #111827;
      font-size: 15px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
    }
    #outputArea.placeholder { color: #9ca3af; font-style: italic; }

    /* Buttons */
    .action-row {
      display: flex;
      gap: 10px;
      margin-bottom: 1rem;
    }

    .btn-translate {
      flex: 1;
      padding: 12px 20px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s;
    }
    .btn-translate:hover { background: #1d4ed8; }
    .btn-translate:disabled { background: #93c5fd; cursor: not-allowed; }
    .btn-translate svg { width: 18px; height: 18px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    .btn-secondary {
      padding: 12px 18px;
      background: #fff;
      color: #374151;
      border: 1.5px solid #d1d5db;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-secondary:hover { background: #f3f4f6; border-color: #9ca3af; }

    /* Output action buttons */
    .output-btns { display: flex; gap: 8px; padding: 6px 12px; border-top: 1px solid #e5e7eb; }
    .icon-btn {
      padding: 6px 12px;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      font-size: 13px;
      color: #374151;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.15s;
    }
    .icon-btn:hover { background: #eff6ff; border-color: #bfdbfe; color: #2563eb; }
    .icon-btn svg { width: 15px; height: 15px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

    /* Status */
    #status {
      font-size: 13px;
      min-height: 20px;
      padding: 0 2px;
      transition: opacity 0.3s;
    }
    #status.loading { color: #2563eb; }
    #status.error { color: #dc2626; }
    #status.success { color: #16a34a; }

    /* Spinner */
    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2.5px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
    </div>
    <div class="header-text">
      <h1>Language Translation Tool</h1>
      <p>Translate text between 12+ languages instantly using AI</p>
    </div>
  </div>

  <!-- Language Selector Row -->
  <div class="lang-row">
    <div>
      <div class="lang-label">From</div>
      <select id="sourceLang">
        <option value="auto">Auto detect</option>
        <option value="English">English</option>
        <option value="Hindi">Hindi</option>
        <option value="Spanish">Spanish</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Arabic">Arabic</option>
        <option value="Chinese">Chinese</option>
        <option value="Japanese">Japanese</option>
        <option value="Portuguese">Portuguese</option>
        <option value="Russian">Russian</option>
        <option value="Urdu">Urdu</option>
      </select>
    </div>

    <button class="swap-btn" id="swapBtn" title="Swap languages">
      <svg viewBox="0 0 24 24"><polyline points="16 3 21 8 16 13"/><line x1="21" y1="8" x2="9" y2="8"/><polyline points="8 21 3 16 8 11"/><line x1="3" y1="16" x2="15" y2="16"/></svg>
    </button>

    <div>
      <div class="lang-label">To</div>
      <select id="targetLang">
        <option value="Hindi">Hindi</option>
        <option value="English" selected>English</option>
        <option value="Spanish">Spanish</option>
        <option value="French">French</option>
        <option value="German">German</option>
        <option value="Arabic">Arabic</option>
        <option value="Chinese">Chinese</option>
        <option value="Japanese">Japanese</option>
        <option value="Portuguese">Portuguese</option>
        <option value="Russian">Russian</option>
        <option value="Urdu">Urdu</option>
      </select>
    </div>
  </div>

  <!-- Text Editors -->
  <div class="editors">
    <div class="editor-box">
      <div class="editor-header">Source Text</div>
      <textarea id="inputText" placeholder="Enter text to translate..." maxlength="1000"></textarea>
      <div class="editor-footer">
        <span class="char-count"><span id="charCount">0</span> / 1000</span>
      </div>
    </div>

    <div class="editor-box output-box">
      <div class="editor-header">Translation</div>
      <div id="outputArea" class="placeholder">Translation will appear here...</div>
      <div class="output-btns" id="outputBtns" style="display:none">
        <button class="icon-btn" id="copyBtn">
          <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy
        </button>
        <button class="icon-btn" id="ttsBtn">
          <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
          Listen
        </button>
      </div>
    </div>
  </div>

  <!-- Action Row -->
  <div class="action-row">
    <button class="btn-translate" id="translateBtn">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      Translate
    </button>
    <button class="btn-secondary" id="clearBtn">Clear</button>
  </div>

  <!-- Status -->
  <div id="status"></div>

</div>

<script>
  const inputText    = document.getElementById('inputText');
  const outputArea   = document.getElementById('outputArea');
  const sourceLang   = document.getElementById('sourceLang');
  const targetLang   = document.getElementById('targetLang');
  const translateBtn = document.getElementById('translateBtn');
  const clearBtn     = document.getElementById('clearBtn');
  const swapBtn      = document.getElementById('swapBtn');
  const copyBtn      = document.getElementById('copyBtn');
  const ttsBtn       = document.getElementById('ttsBtn');
  const outputBtns   = document.getElementById('outputBtns');
  const statusEl     = document.getElementById('status');
  const charCountEl  = document.getElementById('charCount');

  let lastTranslation = '';

  // Character counter
  inputText.addEventListener('input', () => {
    charCountEl.textContent = inputText.value.length;
  });

  // Swap languages
  swapBtn.addEventListener('click', () => {
    const sv = sourceLang.value;
    const tv = targetLang.value;
    if (sv === 'auto') return;
    setSelectValue(sourceLang, tv);
    setSelectValue(targetLang, sv);
    if (lastTranslation) {
      inputText.value = lastTranslation;
      charCountEl.textContent = lastTranslation.length;
      resetOutput();
    }
  });

  function setSelectValue(sel, val) {
    for (let i = 0; i < sel.options.length; i++) {
      if (sel.options[i].value === val) { sel.selectedIndex = i; return; }
    }
  }

  // Clear
  clearBtn.addEventListener('click', () => {
    inputText.value = '';
    charCountEl.textContent = '0';
    statusEl.textContent = '';
    statusEl.className = '';
    resetOutput();
    lastTranslation = '';
  });

  function resetOutput() {
    outputArea.textContent = 'Translation will appear here...';
    outputArea.classList.add('placeholder');
    outputBtns.style.display = 'none';
  }

  // Translate
  translateBtn.addEventListener('click', async () => {
    const text = inputText.value.trim();
    if (!text) {
      setStatus('Please enter some text first.', 'error');
      return;
    }
    const src = sourceLang.value === 'auto' ? 'the detected language' : sourceLang.value;
    const tgt = targetLang.value;
    if (src === tgt) {
      setStatus('Source and target languages are the same.', 'error');
      return;
    }

    translateBtn.disabled = true;
    translateBtn.innerHTML = '<span class="spinner"></span> Translating...';
    setStatus('Translating, please wait...', 'loading');
    outputBtns.style.display = 'none';

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `Translate the following text from ${src} to ${tgt}. Return ONLY the translated text — no explanation, no preamble, no quotes.\n\nText:\n${text}`
          }]
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error?.message || 'API error');
      }

      const translation = (data.content && data.content[0] && data.content[0].text)
        ? data.content[0].text.trim()
        : '';

      if (!translation) throw new Error('Empty translation received');

      lastTranslation = translation;
      outputArea.textContent = translation;
      outputArea.classList.remove('placeholder');
      outputBtns.style.display = 'flex';
      setStatus(`✓ Translated from ${src} to ${tgt}`, 'success');

    } catch (err) {
      console.error(err);
      setStatus('Translation failed: ' + (err.message || 'Unknown error'), 'error');
      resetOutput();
    } finally {
      translateBtn.disabled = false;
      translateBtn.innerHTML = `<svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> Translate`;
    }
  });

  // Copy to clipboard
  copyBtn.addEventListener('click', () => {
    if (!lastTranslation) return;
    navigator.clipboard.writeText(lastTranslation).then(() => {
      copyBtn.innerHTML = `<svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polyline points="20 6 9 17 4 12"/></svg> Copied!`;
      setTimeout(() => {
        copyBtn.innerHTML = `<svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copy`;
      }, 2000);
    });
  });

  // Text-to-Speech
  ttsBtn.addEventListener('click', () => {
    if (!lastTranslation) return;
    const langMap = {
      'Hindi': 'hi-IN', 'English': 'en-US', 'Spanish': 'es-ES',
      'French': 'fr-FR', 'German': 'de-DE', 'Arabic': 'ar-SA',
      'Chinese': 'zh-CN', 'Japanese': 'ja-JP', 'Portuguese': 'pt-BR',
      'Russian': 'ru-RU', 'Urdu': 'ur-PK'
    };
    const utt = new SpeechSynthesisUtterance(lastTranslation);
    utt.lang = langMap[targetLang.value] || 'en-US';
    speechSynthesis.cancel();
    speechSynthesis.speak(utt);
    ttsBtn.innerHTML = `<svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> Playing...`;
    utt.onend = () => {
      ttsBtn.innerHTML = `<svg viewBox="0 0 24 24" style="width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg> Listen`;
    };
  });

  function setStatus(msg, type) {
    statusEl.textContent = msg;
    statusEl.className = type;
  }
</script>
</body>
</html>
